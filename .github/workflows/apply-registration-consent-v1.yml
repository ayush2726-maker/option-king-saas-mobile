name: Apply Registration Consent V1

on:
  push:
    branches:
      - agent/registration-risk-consent-v1
    paths:
      - ".github/workflows/apply-registration-consent-v1.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/registration-risk-consent-v1
          fetch-depth: 0

      - name: Apply mobile consent patch
        shell: bash
        run: |
          echo '' | base64 -d > /tmp/apply_mobile_consent_patch.py
          python /tmp/apply_mobile_consent_patch.py

      - name: Validate mobile source
        shell: bash
        run: |
          node --check App.js || true
          grep -q 'REGISTRATION_POLICY_VERSION' App.js
          grep -q 'whatsapp_trade_alert_opt_in' App.js
          grep -q 'Risk & Rules Acknowledgement' App.js

      - name: Commit generated patch
        shell: bash
        run: |
          rm -f .github/workflows/apply-registration-consent-v1.yml
          git config user.name "okai-consent-bot"
          git config user.email "actions@users.noreply.github.com"
          git add App.js .github/workflows/apply-registration-consent-v1.yml
          git commit -m "Add mandatory registration risk acknowledgement"
          git push origin HEAD:agent/registration-risk-consent-v1
