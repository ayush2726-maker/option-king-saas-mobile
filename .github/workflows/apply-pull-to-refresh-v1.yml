# trigger: pull-to-refresh-v1-2026-07-21
name: Apply Pull To Refresh V1

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-pull-to-refresh-v1.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply pull refresh patch
        run: python scripts/patch_pull_to_refresh_v1.py

      - name: Validate Android export
        env:
          CI: "1"
        run: |
          npm ci
          npx expo export --platform android --output-dir /tmp/okai-pull-refresh
          grep -q 'onPageRefresh={refreshUser}' App.js
          grep -q 'onRefresh={loadTrade}' App.js
          grep -q 'onRefresh={loadAll}' App.js
          grep -q 'onRefresh={refreshAccount}' App.js
          grep -q 'onRefresh={runTest}' App.js
          count=$(grep -c 'refreshControl={<RefreshControl' App.js)
          test "$count" -ge 10

      - name: Commit production fix
        run: |
          rm -f scripts/patch_pull_to_refresh_v1.py
          rm -f .github/workflows/apply-pull-to-refresh-v1.yml
          git config user.name "okai-refresh-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Add pull to refresh across app pages"
          git push origin HEAD:main
