name: Validate Historical Graph Mobile V1

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/historical-graph-v1
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply historical graph patch when needed
        run: |
          if grep -q 'chartRangeDays' App.js; then
            echo 'Historical graph mobile patch already applied'
          else
            python scripts/patch_historical_graph_v1.py
          fi

      - name: Validate Android export and graph controls
        env:
          CI: "1"
        run: |
          npm ci
          npx expo export --platform android --output-dir /tmp/okai-historical-graph
          grep -q 'chartRangeDays' App.js
          grep -q 'TODAY' App.js
          grep -q '7 DAYS' App.js
          grep -q '30 DAYS' App.js
          grep -q 'days=${chartRangeRef.current}' App.js
          grep -q 'Last ${chartRangeDays} days cumulative' App.js
          grep -q 'refreshControl={<RefreshControl' App.js

      - name: Commit production mobile patch
        run: |
          rm -f scripts/patch_historical_graph_v1.py
          rm -f .github/workflows/apply-historical-graph-v1.yml
          git config user.name "okai-history-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Add Today 7-day and 30-day graph history"
          git push origin HEAD:agent/historical-graph-v1
