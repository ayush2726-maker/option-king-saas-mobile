name: Sync Registration Consent With Main

on:
  push:
    branches:
      - agent/registration-risk-consent-v1
    paths:
      - ".github/workflows/sync-registration-consent-main.yml"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/registration-risk-consent-v1
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Merge latest main
        shell: bash
        run: |
          git config user.name "okai-consent-bot"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit origin/main

      - name: Validate Android bundle
        env:
          CI: "1"
        run: |
          npm ci
          npx expo export --platform android --output-dir /tmp/okai-consent-export
          grep -q 'REGISTRATION_POLICY_VERSION' App.js
          grep -q 'whatsapp_trade_alert_opt_in' App.js
          grep -q 'AUTO two-slot' App.js

      - name: Remove one-time workflow and push
        shell: bash
        run: |
          rm -f .github/workflows/sync-registration-consent-main.yml
          git add -A
          git commit -m "Sync consent flow with latest mobile main"
          git push origin HEAD:agent/registration-risk-consent-v1
