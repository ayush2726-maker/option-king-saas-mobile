name: Publish Production OTA

on:
  push:
    branches: [main]
    paths:
      - "App.js"
      - "index.js"
      - "src/**"
      - "app.json"
      - "eas.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/publish-production-update.yml"
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-ota
  cancel-in-progress: true

jobs:
  publish:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check Expo token
        shell: bash
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Missing GitHub Actions secret: EXPO_TOKEN"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Validate Android export
        env:
          CI: "1"
        run: npx expo export --platform android --output-dir /tmp/okai-ota-export

      - name: Publish production update
        env:
          CI: "1"
        run: >-
          eas update
          --channel production
          --message "Email OTP, Forgot Login ID, password reset and password visibility"
          --non-interactive
