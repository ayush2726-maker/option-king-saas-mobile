name: Build Installable Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Check Railway server and current UI
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --retry 5 --retry-delay 5 \
            https://option-king-saas-production.up.railway.app/health \
            | grep -q 'healthy'
          curl --fail --show-error --silent --retry 5 --retry-delay 5 \
            https://option-king-saas-production.up.railway.app/auth/registration-disclosure \
            | grep -q 'OKAI-RISK-2026-07-20-v1'
          grep -q 'Risk & Rules Acknowledgement' App.js
          grep -q 'Forgot Login ID' App.js

      - name: Build signed APK locally
        env:
          CI: "1"
          EAS_LOCAL_BUILD_SKIP_CLEANUP: "1"
          EAS_LOCAL_BUILD_WORKINGDIR: /tmp/eas-local-build
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          OUTPUT="Option-King-AI-v${VERSION}.apk"
          eas build --platform android --profile preview --local \
            --non-interactive --output "$PWD/$OUTPUT"
          test -f "$OUTPUT"
          test "$(stat -c%s "$OUTPUT")" -gt 5000000
          unzip -t "$OUTPUT" >/dev/null
          sha256sum "$OUTPUT" > "$OUTPUT.sha256"
          echo "APK_PATH=$OUTPUT" >> "$GITHUB_ENV"

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: Option-King-AI-APK
          path: |
            ${{ env.APK_PATH }}
            ${{ env.APK_PATH }}.sha256
          retention-days: 30
          if-no-files-found: error
