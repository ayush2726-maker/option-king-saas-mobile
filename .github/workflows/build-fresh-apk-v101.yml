name: Build Fresh APK v1.0.1

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - "App.js"
      - "app.json"
      - "eas.json"
      - "index.js"
      - "src/**"
      - ".github/workflows/build-fresh-apk-v101.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout fresh APK branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || 'agent/fresh-apk-v101' }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Check Railway server
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --retry 5 --retry-delay 5 \
            https://option-king-saas-production.up.railway.app/health \
            | tee /tmp/health.json
          grep -q 'healthy' /tmp/health.json

          curl --fail --show-error --silent --retry 5 --retry-delay 5 \
            https://option-king-saas-production.up.railway.app/auth/registration-disclosure \
            | tee /tmp/disclosure.json
          grep -q 'OKAI-RISK-2026-07-20-v1' /tmp/disclosure.json

      - name: Validate current Android JavaScript bundle
        env:
          CI: "1"
        run: |
          npx expo export --platform android --output-dir /tmp/okai-v101-export
          grep -q 'Risk & Rules Acknowledgement' App.js
          grep -q 'Forgot Login ID' App.js
          grep -q 'Pay ₹1,999 with PhonePe / UPI' App.js

      - name: Build signed APK locally
        env:
          CI: "1"
          EAS_LOCAL_BUILD_SKIP_CLEANUP: "1"
          EAS_LOCAL_BUILD_WORKINGDIR: /tmp/eas-local-build
        shell: bash
        run: |
          set +e
          eas build \
            --platform android \
            --profile preview \
            --local \
            --non-interactive \
            --output "$PWD/Option-King-AI-v1.0.1.apk" \
            > /tmp/eas-local.stdout 2> /tmp/eas-local.stderr
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "Local EAS build failed with status $status"
            tail -n 160 /tmp/eas-local.stdout || true
            tail -n 160 /tmp/eas-local.stderr || true
            exit "$status"
          fi

          test -f Option-King-AI-v1.0.1.apk
          test "$(stat -c%s Option-King-AI-v1.0.1.apk)" -gt 5000000
          unzip -t Option-King-AI-v1.0.1.apk >/dev/null
          sha256sum Option-King-AI-v1.0.1.apk | tee Option-King-AI-v1.0.1.apk.sha256

      - name: Save local build failure diagnostic
        if: failure()
        shell: bash
        run: |
          mkdir -p /tmp/okai-diagnostic
          {
            echo "UTC: $(date -u +%FT%TZ)"
            echo "App version: 1.0.1"
            echo ""
            echo "--- STDOUT ---"
            tail -n 200 /tmp/eas-local.stdout 2>/dev/null || true
            echo ""
            echo "--- STDERR ---"
            tail -n 200 /tmp/eas-local.stderr 2>/dev/null || true
          } > /tmp/okai-diagnostic/local-apk-build-error.txt

          git fetch origin agent/fresh-apk-v101
          git switch -C agent/fresh-apk-v101 origin/agent/fresh-apk-v101
          mkdir -p diagnostics
          cp /tmp/okai-diagnostic/local-apk-build-error.txt diagnostics/local-apk-build-error.txt
          git config user.name "okai-apk-build-bot"
          git config user.email "actions@users.noreply.github.com"
          git add diagnostics/local-apk-build-error.txt
          git commit -m "Save local APK build diagnostic" || true
          git push origin HEAD:agent/fresh-apk-v101 || true

      - name: Upload installable APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Option-King-AI-v1.0.1-APK
          path: |
            Option-King-AI-v1.0.1.apk
            Option-King-AI-v1.0.1.apk.sha256
          retention-days: 30
          if-no-files-found: error

      - name: Publish production OTA for runtime 1.0.1
        if: success()
        env:
          CI: "1"
        run: >-
          eas update
          --channel production
          --message "Fresh APK v1.0.1 registration and server connectivity fix"
          --non-interactive
