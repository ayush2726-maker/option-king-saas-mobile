name: Validate Registration Consent V1

on:
  push:
    branches:
      - agent/registration-risk-consent-v1
    paths:
      - ".github/workflows/validate-registration-consent-v1.yml"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/registration-risk-consent-v1
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export Android bundle
        env:
          CI: "1"
        run: npx expo export --platform android --output-dir /tmp/okai-consent-export

      - name: Verify generated bundle
        run: |
          test -d /tmp/okai-consent-export
          grep -q 'REGISTRATION_POLICY_VERSION' App.js
          grep -q 'whatsapp_trade_alert_opt_in' App.js

      - name: Remove one-time workflow
        shell: bash
        run: |
          rm -f .github/workflows/validate-registration-consent-v1.yml
          git config user.name "okai-consent-bot"
          git config user.email "actions@users.noreply.github.com"
          git add .github/workflows/validate-registration-consent-v1.yml
          git commit -m "Validate registration consent Android bundle"
          git push origin HEAD:agent/registration-risk-consent-v1
