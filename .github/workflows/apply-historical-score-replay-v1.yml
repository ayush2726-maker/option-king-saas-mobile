name: Validate Historical Score Replay Mobile V1

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/historical-score-replay-v1
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply score replay UI patch when needed
        run: |
          if grep -q 'replayScorePoints' App.js; then
            echo 'Historical score replay UI already applied'
          else
            python scripts/patch_historical_score_replay_v1.py
          fi

      - name: Validate Android export and score fallback
        env:
          CI: "1"
        run: |
          npm ci
          npx expo export --platform android --output-dir /tmp/okai-score-replay-mobile
          grep -q 'replayScorePoints' App.js
          grep -q 'savedScorePoints' App.js
          grep -q 'HISTORICAL REPLAY' App.js
          grep -q 'score_count' App.js
          grep -q 'Historical candles par strategy replay score' App.js

      - name: Commit production mobile patch
        run: |
          rm -f scripts/patch_historical_score_replay_v1.py
          rm -f .github/workflows/apply-historical-score-replay-v1.yml
          git config user.name "okai-score-replay-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Show historical replay score when saved score is unavailable"
          git push origin HEAD:agent/historical-score-replay-v1
